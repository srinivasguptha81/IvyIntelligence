{% extends 'base/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Edit Profile — Ivy Intelligence{% endblock %}
{% block content %}
<div class="container py-4" style="max-width: 750px;">
    <h3 class="fw-bold mb-4" style="color: var(--ivy-blue);">Edit Profile</h3>
    <div class="card p-4">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {% crispy user_form %}
            <hr>
            {% crispy form %}
        </form>
    </div>
</div>
{% endblock %}
