{% extends 'base/base.html' %}
{% load i18n %}

{% block title %}Password Changed - Ivy Intelligence{% endblock %}

{% block content %}
<div class="container my-5 py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 rounded-circle mb-3" style="width: 70px; height: 70px;">
                        <i class="bi bi-check-circle-fill fs-2 text-success"></i>
                    </div>
                    <h2 class="fw-bold text-primary">{% trans "Password Changed" %}</h2>
                    <p class="text-muted mb-4">
                        {% trans "Your password is now changed." %}
                    </p>
                    <a href="{% url 'account_login' %}" class="btn btn-primary rounded-pill px-5 fw-bold mt-2">Log In Now</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
