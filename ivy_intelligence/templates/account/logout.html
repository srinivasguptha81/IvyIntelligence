{% extends "base/base.html" %}
{% load i18n %}

{% block title %}Sign Out - Ivy Intelligence{% endblock %}

{% block content %}
<div class="container my-5 py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 text-center">
                <div class="card-body p-4 p-md-5">
                    <div class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-10 rounded-circle mb-3" style="width: 70px; height: 70px;">
                        <i class="bi bi-box-arrow-right fs-2 text-danger"></i>
                    </div>
                    <h2 class="fw-bold mb-3" style="color: var(--ivy-blue);">{% trans "Sign Out" %}</h2>
                    <p class="text-muted mb-4">{% trans "Are you sure you want to sign out?" %}</p>

                    <form method="post" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        {% if redirect_field_value %}
                        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                        {% endif %}
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-danger btn-lg rounded-pill fw-bold">{% trans "Yes, Sign Out" %}</button>
                            <a href="javascript:history.back()" class="btn btn-light btn-lg rounded-pill fw-bold border text-muted">{% trans "Cancel" %}</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
